services:
  - type: web
    name: taskflow-backend
    runtime: docker
    dockerfilePath: ./Dockerfile
    envVars:
      - key: MONGODB_URI
        sync: false
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_EXPIRATION_MS
        value: 86400000
      - key: CORS_ALLOWED_ORIGINS
        value: https://taskflow-frontend.onrender.com

  - type: web
    name: taskflow-frontend
    runtime: docker
    dockerfilePath: ./Dockerfile.frontend
    envVars:
      - key: VITE_API_BASE_URL
        value: https://taskflow-backend.onrender.com/api
