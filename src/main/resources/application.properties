spring.application.name=taskflow-backend
server.port=${PORT:8081}
spring.data.mongodb.uri=${MONGODB_URI}
spring.data.mongodb.auto-index-creation=true

app.jwt.secret=${JWT_SECRET:taskflow-development-secret-key-with-at-least-256-bits-for-hmac-signing}
app.jwt.expiration-ms=${JWT_EXPIRATION_MS:86400000}
app.cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:5173,http://127.0.0.1:5173,http://localhost:5174,http://127.0.0.1:5174}
